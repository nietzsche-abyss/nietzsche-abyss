<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 600;
            transition: transform 0.3s ease, color 0.3s ease;
            cursor: default;
            margin-bottom: 30px;
        }
        h1:hover {
            transform: rotateX(10deg) rotateY(-5deg);
            color: #0071e3;
        }
        ul.blog-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            border-top: 1px solid #ddd;
        }
        .blog-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
        }
        ul.blog-list li a {
            color: #0071e3;
            text-decoration: none;
            font-size: clamp(18px, 5vw, 24px);
        }
        ul.blog-list li a:hover {
            color: #000;
        }
        .date {
            color: #888;
            font-size: 14px;
        }
        #blog-content {
            text-align: left;
            line-height: 1.6;
            margin-top: 20px;
        }
        .back-link {
            color: #0071e3;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <ul class="blog-list" id="blog-list"></ul>
        <div id="blog-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const blogs = [
            { title: "My First Blog", file: "blogs/2025-01-11_blog1.md" },
            { title: "Second Blog Post", file: "blogs/2024-03-08_blog2.md" }
            // Add more blogs here following the same filename format
        ];

        const blogListEl = document.getElementById('blog-list');
        const blogContentEl = document.getElementById('blog-content');
        const titleEl = document.getElementById('title-decoder');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";

        function decodeElement(el, finalText, speed) {
            let iterations = 0;
            const interval = setInterval(() => {
                el.textContent = finalText.split('')
                    .map((char, i) => i < iterations ? char : chars[Math.floor(Math.random() * chars.length)])
                    .join('');
                iterations++;
                if (iterations > finalText.length) {
                    clearInterval(interval);
                    el.textContent = finalText;
                }
            }, speed);
        }

        // Start decoding animation
        decodeElement(titleEl, titleEl.innerText, 50);

        // Extract date from file name
        function extractDate(filename) {
            const match = filename.match(/(\d{4}-\d{2}-\d{2})/);
            return match ? match[1] : '';
        }

        // Sort blogs by date descending
        blogs.sort((a, b) => (extractDate(b.file).localeCompare(extractDate(a.file))));

        function renderBlogList() {
            blogContentEl.innerHTML = '';
            blogListEl.style.display = 'block';
            blogListEl.innerHTML = '';
            blogs.forEach(blog => {
                const li = document.createElement('li');
                li.className = 'blog-item';

                const a = document.createElement('a');
                a.textContent = blog.title;
                a.href = "#";
                a.onclick = (e) => {
                    e.preventDefault();
                    loadBlog(blog.file);
                };

                const date = document.createElement('span');
                date.className = 'date';
                date.textContent = extractDate(blog.file);

                li = document.createElement('li');
                li.className = 'blog-item';
                li.appendChild(a);
                li.appendChild(date);

                blogListEl.appendChild(li);
            });
        }

        function loadBlog(file) {
            fetch(file)
                .then(res => {
                    if (!res.ok) throw new Error("File not found");
                    return res.text();
                })
                .then(md => {
                    blogListEl.style.display = 'none';
                    blogContentEl.innerHTML = marked.parse(md);

                    const backLink = document.createElement('div');
                    backLink.textContent = "← Back to Blogs";
                    backLink.className = 'back-link';
                    backLink.onclick = () => renderBlogList();
                    blogContentEl.prepend(backLink);
                })
                .catch(() => blogContentEl.innerHTML = '<p>Error loading blog content.</p>');
            blogListEl.style.display = 'none';
        }

        function extractDate(filename) {
            return filename.match(/(\d{4}-\d{2}-\d{2})_/)[1];
        }

        window.onload = renderBlogList;
    </script>
</body>
</html>
