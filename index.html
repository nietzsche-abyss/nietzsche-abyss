<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nietzsche Virus Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 700px;
    }
    h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 600;
      letter-spacing: -0.02em;
      cursor: default;
      transition: transform 0.3s;
    }
    h1:hover {
      transform: rotateX(15deg) rotateY(10deg);
      color: #0071e3;
    }
    .blog-list {
      list-style: none;
      padding: 0;
      margin-top: 30px;
      border-top: 1px solid #ddd;
    }
    .blog-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }
    .blog-item a {
      font-size: 20px;
      text-decoration: none;
      color: #0071e3;
    }
    .date {
      color: #999;
      font-size: 14px;
    }
    #blog-content {
      margin-top: 30px;
      line-height: 1.6;
    }
    .back-link {
      cursor: pointer;
      color: #0071e3;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1 id="title">Nietzsche Virus Lab</h1>
  <ul id="blog-list" class="blog-list"></ul>
  <div id="blog-content"></div>
</div>

<script>
  const blogs = [
    {title: "First Blog", file: "blogs/2024-03-07_blog1.md"},
    {title: "Second Blog", file: "blogs/2023-11-14_blog2.md"},
    {title: "Third Blog", file: "blogs/2023-06-20_blog3.md"},
    // Add more sample blogs here
  ];

  const blogListEl = document.getElementById('blog-list');
  const blogContentEl = document.getElementById('blog-content');
  const titleEl = document.getElementById('title');

  // Decode animation (working version)
  function decodeElement(el, finalText, speed) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
    let iterations = 0;
    const interval = setInterval(() => {
      el.textContent = finalText.split('')
        .map((char, idx) => idx < iterations ? char : chars[Math.floor(Math.random() * chars.length)])
        .join('');
      iterations++;
      if(iterations > finalText.length) clearInterval(interval);
    }, speed);
  }

  decodeElement(titleEl, titleEl.textContent, 50);

  // Extract date from filename
  function getDate(file){
    const match = file.match(/\d{4}-\d{2}-\d{2}/);
    if (!match) return "Unknown";
    return match[0];
  }

  // Sort the blogs by date descending
  blogs.sort((a,b) => {
    return getDate(b.file).localeCompare(getDate(a.file));
  });

  const blogList = document.getElementById('blog-list');
  const blogContent = document.getElementById('blog-content');

  function renderBlogList(){
    blogContent.innerHTML = '';
    blogList.innerHTML = '';
    blogList.style.display = 'block';

    blogs.forEach(blog => {
      const li = document.createElement('li');
      li.className = 'blog-item';

      const a = document.createElement('a');
      a.href = '#';
      a.textContent = blog.title;
      a.onclick = (e) => {
        e.preventDefault();
        loadBlog(blog.file);
      };

      const date = document.createElement('span');
      date.className = 'date';
      date.textContent = getDate(blog.file);

      li.appendChild(a);
      li.appendChild(date);
      blogList.appendChild(li);
    });
  }

  function loadBlog(file){
    fetch(file)
      .then(res => res.ok ? res.text() : Promise.reject("Blog not found"))
      .then(md => {
        blogList.style.display='none';
        blogContent.innerHTML = marked.parse(md);
        const back = document.createElement('div');
        back.className='back-link';
        back.textContent='← Back';
        back.onclick = () => {
          blogContent.innerHTML='';
          blogList.style.display='block';
        };
        blogContent.prepend(back);
      })
      .catch(err => blogContent.innerHTML="<p>Error loading blog.</p>");
  }

  window.onload = () => {
    decodeElement(titleEl, titleEl.textContent, 50);
    renderBlogList();
  };
</script>
</body>
</html>
