<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            perspective: 1000px;
            max-width: 90%;
        }
        h1 {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            word-wrap: break-word;
        }
        h1:hover {
            transform: rotateX(20deg) rotateY(20deg) translateZ(50px);
            color: #0071e3;
        }
        p {
            font-size: clamp(16px, 5vw, 24px);
            font-weight: 400;
            color: #6e6e73;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            position: relative;
            display: inline-block;
        }
        .dot {
            color: #0071e3;
            font-size: clamp(18px, 5vw, 28px);
        }

        /* Hacker Decoding Effect */
        .decoder {
            display: inline-block;
            animation: decode 3s steps(30) forwards;
        }
        @keyframes decode {
            0% {
                color: #6e6e73;
                text-shadow: 0 0 5px #0071e3;
            }
            20% {
                content: "X7K9P#M2$Q8R%T3&J5L*W1";
                color: #0071e3;
                text-shadow: 0 0 10px #0071e3;
            }
            40% {
                content: "N4$F8@V6!H2&D9%K3*P7M#";
                color: #0071e3;
                text-shadow: 0 0 8px #0071e3;
            }
            60% {
                content: "G1!J5#Q9&T3$R8%M2@P7K*";
                color: #0071e3;
                text-shadow: 0 0 6px #0071e3;
            }
            80% {
                content: "Th1s w3b$!te 1s curr3ntly";
                color: #6e6e73;
                text-shadow: 0 0 3px #0071e3;
            }
            100% {
                color: #6e6e73;
                text-shadow: none;
            }
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                margin-bottom: 12px;
            }
            p {
                white-space: normal; /* Wraps text on small screens */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nietzsche Virus Lab</h1>
        <p class="decoder">This website is currently under construction. Check back soon<span class="dot">.</span></p>
    </div>
</body>
</html>
