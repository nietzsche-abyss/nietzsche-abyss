<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            text-align: center;
            padding: 20px;
            perspective: 1000px;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            display: inline-block;
            word-wrap: break-word;
        }
        h1:hover {
            transform: rotateX(20deg) rotateY(20deg) translateZ(50px);
            color: #0071e3;
        }
        .blog-post {
            text-align: left;
            margin-top: 40px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        a {
            color: #0071e3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <div id="blog-container"></div>
    </div>

    <script>
        function decodeElement(element, finalText, speed) {
            const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let decodedText = "";
            let index = 0;

            function getRandomChar() {
                return characters[Math.floor(Math.random() * characters.length)];
            }

            function decode() {
                if (index < finalText.length) {
                    decodedText = finalText.slice(0, index);
                    let randomPart = "";
                    for (let i = index; i < finalText.length; i++) {
                        randomPart += getRandomChar();
                    }
                    element.innerHTML = decodedText + randomPart;
                    element.classList.add('decoding');
                    index++;
                    setTimeout(decode, speed);
                } else {
                    element.innerHTML = finalText;
                    element.classList.remove('decoding');
                }
            }

            decode();
        }

        async function loadBlogPosts() {
            const posts = ["blog1.md", "blog2.md"]; // Add markdown filenames here
            const container = document.getElementById('blog-container');

            for (const post of posts) {
                const response = await fetch(post);
                const markdown = await response.text();
                const htmlContent = marked.parse(markdown);

                const postDiv = document.createElement('div');
                postDiv.className = 'blog-post';
                postDiv.innerHTML = htmlContent;

                container.appendChild(postDiv);
            }
        }

        window.onload = function() {
            decodeElement(document.getElementById('title-decoder'), 'Nietzsche Virus Lab', 50);
            loadBlogPosts();
        };
    </script>
</body>
</html>
