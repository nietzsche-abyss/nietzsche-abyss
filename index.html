<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 600;
            transition: transform 0.3s ease, color 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }
        h1:hover {
            transform: rotateX(15deg) rotateY(-10deg);
            color: #0071e3;
        }
        ul.blog-list {
            list-style: none;
            padding: 0;
        }
        ul.blog-list li {
            margin-bottom: 12px;
        }
        ul.blog-list li a {
            color: #0071e3;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.2s;
        }
        ul.blog-list li a:hover {
            color: #000;
        }
        #blog-content {
            line-height: 1.6;
        }
        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: #0071e3;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <ul class="blog-list" id="blog-list"></ul>
        <div id="blog-content"></div>
    </div>

    <script>
        const blogs = [
            { title: "My First Blog", file: "blogs/blog1.md" },
            // Add more blogs here as needed
        ];

        const blogList = document.getElementById('blog-list');
        const blogContent = document.getElementById('blog-content');
        const titleEl = document.getElementById('title-decoder');

        // Decoding animation (working properly)
        function decodeElement(el, finalText, speed) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let iterations = 0;
            const interval = setInterval(() => {
                el.textContent = finalText.split('')
                    .map((char, i) => i < iterations ? char : chars[Math.floor(Math.random() * chars.length)])
                    .join('');
                if (iterations >= finalText.length) clearInterval(interval);
                iterations++;
            }, speed);
        }

        // Show list of blogs
        function renderBlogList() {
            blogContent.innerHTML = '';
            blogList.style.display = 'block';
            blogList.innerHTML = '';
            blogs.forEach(blog => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.textContent = blog.title;
                a.href = "#";
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadBlog(blog.file);
                });
                li.appendChild(a);
                blogList.appendChild(li);
            });
        }

        // Load and show markdown blog
        function loadBlog(filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(md => {
                    blogList.style.display = 'none';
                    blogContent.innerHTML = marked.parse(md);

                    const backLink = document.createElement('div');
                    backLink.textContent = '← Back to Blogs';
                    backLink.className = 'back-link';
                    backLink.onclick = () => renderBlogList();
                    blogContent.prepend(backLink);
                })
                .catch(() => blogContent.innerHTML = '<p>Error loading blog content.</p>');
        }

        // Initialize
        window.onload = function () {
            decodeElement(titleEl, titleEl.innerText, 50);
            renderBlogList();
        };
    </script>
</body>
</html>
