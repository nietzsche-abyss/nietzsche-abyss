<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
        }
        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
            perspective: 1000px;
        }
        h1 {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            transition: transform 0.3s ease, color 0.3s ease;
            display: inline-block;
            word-wrap: break-word;
        }
        h1:hover {
            transform: rotateX(15deg) rotateY(-10deg);
            color: #0071e3;
        }
        ul.blog-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }
        ul.blog-list li {
            margin-bottom: 10px;
        }
        ul.blog-list li a {
            color: #0071e3;
            text-decoration: none;
            font-size: clamp(18px, 5vw, 24px);
        }
        ul.blog-list li a:hover {
            color: #000;
        }
        #blog-content {
            margin-top: 20px;
            line-height: 1.6;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #0071e3;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <ul class="blog-list" id="blog-list"></ul>
        <div id="blog-content"></div>
    </div>

    <script>
        const blogs = [
            { title: "First Blog Post", file: "blogs/blog1.md" },
            { title: "Second Blog", file: "blogs/blog2.md" }
            // Add more blog posts here
        ];

        const blogListEl = document.getElementById('blog-list');
        const blogContentEl = document.getElementById('blog-content');
        const titleDecoder = document.getElementById('title-decoder');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";

        // Decoding animation function
        function decodeElement(element, finalText, speed) {
            let iterations = 0;
            const interval = setInterval(() => {
                element.textContent = finalText.split('')
                    .map((char, idx) => idx < iterations ? char : chars[Math.floor(Math.random() * chars.length)])
                    .join('');
                iterations++;
                if (iterations > finalText.length) clearInterval(interval);
            }, speed);
        }

        // Start decoding animation on page load
        window.onload = function() {
            decodeElement(titleDecoder, "Nietzsche Virus Lab", 50);
            showBlogList();
        };

        // Display blog titles
        function showBlogList() {
            blogs.forEach(blog => {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = "#";
                link = document.createElement('a');
                link.href = "#";
                linkText = document.createTextNode(blog.title);
                a = document.createElement('a');
                a.textContent = blog.title;
                a.href = "#";
                a.onclick = function(e) {
                    e.preventDefault();
                    loadBlog(blog.file);
                };
                li.appendChild(a);
                blogList.appendChild(li);
            });
        }

        // Load blog content from markdown file
        function loadBlog(file) {
            fetch(file)
                .then(response => response.text())
                .then(markdown => {
                    blogList.style.display = 'none';
                    blogContent.innerHTML = marked.parse(markdown);
                    const backLink = document.createElement('a');
                    backLink.textContent = "← Back to Blogs";
                    backLink.className = "back-link";
                    backLink.onclick = function() {
                        blogContent.innerHTML = '';
                        blogList.style.display = 'block';
                    };
                    blogContent.appendChild(backLink);
                })
                .catch(() => blogContent.innerHTML = "<p>Error loading blog.</p>");
        }

        // Corrected variables
        const blogList = document.getElementById('blog-list');
        const blogContent = document.getElementById('blog-content');
    </script>
</body>
</html>
