<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            perspective: 1000px;
            max-width: 90%; /* Prevents overflow on small screens */
        }
        h1 {
            font-size: clamp(32px, 10vw, 56px); /* Scales between 32px and 56px */
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            word-wrap: break-word; /* Ensures long words break */
        }
        h1:hover {
            transform: rotateX(20deg) rotateY(20deg) translateZ(50px);
            color: #0071e3;
        }
        p {
            font-size: clamp(16px, 5vw, 24px); /* Scales between 16px and 24px */
            font-weight: 400;
            color: #6e6e73;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #0071e3;
            animation: typing 3s steps(40, end) infinite, blink 0.75s step-end infinite;
        }
        .dot {
            color: #0071e3;
            font-size: clamp(18px, 5vw, 28px);
        }

        /* Typing Animation */
        @keyframes typing {
            0% { width: 0; }
            50% { width: 100%; }
            100% { width: 0; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                margin-bottom: 12px;
            }
            p {
                white-space: normal; /* Allows text to wrap on small screens */
                animation: none; /* Disables typing animation for readability */
                border-right: none; /* Removes cursor on mobile */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nietzsche Virus Lab</h1>
        <p>This website is currently under construction. Check back soon<span class="dot">.</span></p>
    </div>
</body>
</html>
