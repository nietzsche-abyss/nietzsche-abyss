<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nietzsche Virus Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer data-domain="nietzsche.blog" src="https://plausible.io/js/script.hash.js"></script>
<script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 700px;
    }
    /* Make title clickable without link-like styling, no rotation on hover */
    h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 600;
      letter-spacing: -0.02em;
      cursor: pointer;
      margin: 0;
      /* Removed transform transitions to avoid rotation. */
      transition: none;
    }
    
    /* Remove color change or rotation on hover completely */
    h1:hover {
      /* No transform, no color change */
      transform: none;
      color: inherit;
    }

    /* Ensure no color change or transform on click (active/focus) */
    h1:active, h1:focus {
      color: inherit;
      transform: none;
    }

    .blog-list {
      list-style: none;
      padding: 0;
      margin-top: 30px;
      border-top: 1px solid #ddd;
    }
    .blog-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }
    .blog-item a {
      font-size: 20px;
      text-decoration: none;
      color: #0071e3;
    }
    .date {
      color: #999;
      font-size: 14px;
    }
    #blog-content {
      margin-top: 30px;
      line-height: 1.6;
    }
    .back-link {
      cursor: pointer;
      color: #0071e3;
      margin-bottom: 15px;
    }
    .share-buttons {
      margin-top: 20px;
    }
    .share-buttons a {
      text-decoration: none;
      margin-right: 10px;
      color: #0071e3;
    }
  </style>
</head>
<body>
<div class="container">
  <h1 id="title">Nietzsche Virus Lab</h1>
  <ul id="blog-list" class="blog-list"></ul>
  <div id="blog-content"></div>
</div>

<script>
  // Global list of blogs with a unique 'slug'
  const blogs = [
    {
      title: "First Blog",
      file: "blogs/2024-03-07_blog1.md",
      slug: "2024-03-07_blog1",
      url: "https://yourdomain.com/#blog=2024-03-07_blog1" // For manual sharing if desired
    },
    {
      title: "Second Blog",
      file: "blogs/2023-11-14_blog2.md",
      slug: "2023-11-14_blog2",
      url: "https://yourdomain.com/#blog=2023-11-14_blog2"
    },
    {
      title: "Third Blog",
      file: "blogs/2023-06-20_blog3.md",
      slug: "2023-06-20_blog3",
      url: "https://yourdomain.com/#blog=2023-06-20_blog3"
    }
    // Add more sample blogs here
  ];

  const blogListEl = document.getElementById('blog-list');
  const blogContentEl = document.getElementById('blog-content');
  const titleEl = document.getElementById('title');

  /**
   * Decodes an element's text by revealing the actual text character-by-character,
   * replacing the rest with random characters.
   *
   * @param {HTMLElement} el - The element whose text we want to decode.
   * @param {string} finalText - The final text to display.
   * @param {number} speed - The interval speed in ms for each decoding iteration.
   */
  function decodeElement(el, finalText, speed) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
    let iterations = 0;
    const interval = setInterval(() => {
      el.textContent = finalText
        .split('')
        .map((char, idx) => (idx < iterations)
          ? char
          : chars[Math.floor(Math.random() * chars.length)])
        .join('');
      iterations++;
      if (iterations > finalText.length) {
        clearInterval(interval);
      }
    }, speed);
  }

  /**
   * Decodes all text nodes within a container, preserving HTML structure.
   * @param {HTMLElement} container - The container whose text nodes we want to decode.
   * @param {number} speed - The interval speed in ms for each decoding.
   */
  function decodeBlogContent(container, speed) {
    // We walk the DOM and decode each text node individually.
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    const textNodes = [];
    while (walker.nextNode()) {
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach((node) => {
      const finalText = node.nodeValue;
      node.nodeValue = '';
      let iterations = 0;
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
      const interval = setInterval(() => {
        node.nodeValue = finalText
          .split('')
          .map((char, idx) => (idx < iterations)
            ? char
            : chars[Math.floor(Math.random() * chars.length)])
          .join('');
        iterations++;
        if (iterations > finalText.length) {
          clearInterval(interval);
        }
      }, speed);
    });
  }

  // Extract date from filename
  function getDate(file){
    const match = file.match(/\d{4}-\d{2}-\d{2}/);
    if (!match) return "Unknown";
    return match[0];
  }

  // Sort the blogs by date descending
  blogs.sort((a,b) => {
    return getDate(b.file).localeCompare(getDate(a.file));
  });

  function renderBlogList(){
    blogContentEl.innerHTML = '';
    blogListEl.innerHTML = '';
    blogListEl.style.display = 'block';

    blogs.forEach(blog => {
      const li = document.createElement('li');
      li.className = 'blog-item';

      const a = document.createElement('a');
      a.href = "#blog=" + blog.slug;
      a.textContent = '';
      decodeElement(a, blog.title, 30);

      a.onclick = (e) => {
        e.preventDefault();
        window.location.hash = "blog=" + blog.slug;
        loadBlogBySlug(blog.slug);
      };

      const dateSpan = document.createElement('span');
      dateSpan.className = 'date';
      dateSpan.textContent = getDate(blog.file);

      li.appendChild(a);
      li.appendChild(dateSpan);
      blogListEl.appendChild(li);
    });
  }

  function loadBlogBySlug(slug) {
    const blog = blogs.find(b => b.slug === slug);
    if (!blog) {
      blogContentEl.innerHTML = "<p>Blog not found.</p>";
      return;
    }
    loadBlog(blog.file, blog.url);
  }

  function loadBlog(file, blogUrl){
    blogListEl.style.display='none';

    fetch(file)
      .then(res => res.ok ? res.text() : Promise.reject("Blog not found"))
      .then(md => {
        blogContentEl.innerHTML = marked.parse(md);

        // Add a 'back' link
        const back = document.createElement('div');
        back.className='back-link';
        back.textContent='\u2190 Back';
        back.onclick = () => {
          blogContentEl.innerHTML='';
          blogListEl.style.display='block';
          window.location.hash = "";
        };
        blogContentEl.prepend(back);

        // Add social media share buttons
        const shareButtons = document.createElement('div');
        shareButtons.className = 'share-buttons';

        const twitterLink = `https://twitter.com/intent/tweet?url=${encodeURIComponent(blogUrl)}`;
        const fbLink = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(blogUrl)}`;
        const linkedInLink = `https://linkedin.com/shareArticle?url=${encodeURIComponent(blogUrl)}`;

        shareButtons.innerHTML = `
          <a href="${twitterLink}" target="_blank">Share on X</a>
          <a href="${fbLink}" target="_blank">Share on Facebook</a>
          <a href="${linkedInLink}" target="_blank">Share on LinkedIn</a>
        `;
        blogContentEl.appendChild(shareButtons);

        // Decode all blog content after we have appended everything
        decodeBlogContent(blogContentEl, 10);
      })
      .catch(() => {
        blogContentEl.innerHTML="<p>Error loading blog.</p>";
      });
  }

  // Check if we have a blog slug in the URL hash (#blog=SLUG) and load that blog automatically.
  function checkHashForBlog(){
    const hash = window.location.hash;
    if (hash.startsWith("#blog=")) {
      const slug = hash.substring(6);
      loadBlogBySlug(slug);
    } else {
      renderBlogList();
    }
  }

  // Decode main title, then check if a slug was provided
  window.onload = () => {
    decodeElement(titleEl, titleEl.textContent, 50);
    // Title goes Home when clicked
    titleEl.onclick = () => {
      // Reset hash and content to show the blog list
      window.location.hash = "";
      blogContentEl.innerHTML = '';
      blogListEl.style.display = 'block';
    };

    checkHashForBlog();
  };

  window.addEventListener("hashchange", checkHashForBlog);

  // Existing Test Cases:
  // 1) Ensure decodeElement is applied to the main title and each blog listing.
  // 2) Check that when a blog item is clicked, the correct markdown is loaded.
  // 3) Check the back arrow returns to the listings.
  // 4) If user visits #blog=<slug> directly, it should load that blog's content right away.
  // 5) If user clicks the back link, the hash is cleared and the blog list reappears.
  // Additional Test Case:
  // 6) The blog content is decoded once it is loaded.
  // 7) Clicking the title resets hash and shows the blog list.
</script>
</body>
</html>
