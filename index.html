<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
            word-wrap: break-word;
        }

        h1:hover {
            transform: rotateX(10deg) rotateY(-5deg);
        }

        ul.blog-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        ul.blog-list li {
            margin: 12px 0;
        }

        ul.blog-list li a {
            font-size: 1.2rem;
            color: #0071e3;
            text-decoration: none;
            transition: color 0.2s;
        }

        ul.blog-list li a:hover {
            color: #000;
        }

        #blog-content {
            margin-top: 20px;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #0071e3;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <ul class="blog-list" id="blog-list"></ul>
        <div id="blog-content"></div>
    </div>

    <script>
        // Decoding animation
        function decodeElement(element, finalText, speed) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let displayText = "";
            let i = 0;

            const decodeInterval = setInterval(() => {
                elementText = finalText.split('')
                    .map((char, idx) => idx < i ? char : chars[Math.floor(Math.random() * chars.length)])
                    .join('');

                element.innerText = elementText;

                if (i >= finalText.length) clearInterval(decodeInterval);
                i += 1;
            }, speed);
        }, speed);

        const element = document.getElementById('title-decoder');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        const finalText = element.innerText;
        decodeElement(element, finalText, 50);

        function decodeElement(el, text, speed) {
            let iterations = 0;
            const interval = setInterval(() => {
                el.innerText = text
                    .split('')
                    .map((char, idx) => idx < iterations ? char : chars[Math.floor(Math.random() * chars.length)])
                    .join('');

                if (iterations >= text.length) clearInterval(interval);
                iterations++;
            }, speed);
        }

        decodeElement(document.getElementById('title-decoder'), 'Nietzsche Virus Lab', 50);

        const blogs = [
            { title: "First Blog", file: "blogs/blog1.md" },
            { title: "Second Blog", file: "blogs/blog2.md" },
            // Add more blogs here
        ];

        const blogListEl = document.getElementById('blog-list');
        const blogContentEl = document.getElementById('blog-content');

        function showBlogList() {
            blogContentEl.innerHTML = '';
            blogListEl.innerHTML = '';
            blogListEl.style.display = 'block';

            blogs.forEach(blog => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.innerText = blog.title;
                a.href = "#";
                a.onclick = () => {
                    loadBlog(blog);
                };
                li.appendChild(a);
                blogListEl.appendChild(li);
            });
        }

        function loadBlog(blog) {
            fetch(blog.file)
                .then(response => response.text())
                .then(markdown => {
                    blogContentEl.innerHTML = marked.parse(markdown);
                    blogListEl.style.display = "none";

                    const backLink = document.createElement('a');
                    backLink.innerText = "← Back to blog list";
                    backLink.href = "#";
                    backLink.className = "back-link";
                    backLink.onclick = () => {
                        blogContentEl.innerHTML = '';
                        blogListEl.style.display = 'block';
                    };
                    blogContentEl.appendChild(backLink);
                })
                .catch(() => {
                    blogContentEl.innerHTML = '<p>Blog could not be loaded.</p>';
                });
            blogListEl.style.display = 'none';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            decodeElement(document.getElementById('title-decoder'), "Nietzsche Virus Lab", 50);
            showBlogList();
        });

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
    </script>
</body>
</html>
