<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            perspective: 1000px;
            max-width: 90%;
        }
        h1 {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            word-wrap: break-word;
            display: inline-block;
        }
        h1:hover {
            transform: rotateX(20deg) rotateY(20deg) translateZ(50px);
            color: #0071e3;
        }
        p {
            font-size: clamp(16px, 5vw, 24px);
            font-weight: 400;
            color: #6e6e73;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            display: inline-block;
        }
        .dot {
            color: #0071e3;
            font-size: clamp(18px, 5vw, 28px);
        }
        .decoding {
            text-shadow: 0 0 5px #0071e3;
            transition: text-shadow 0.3s ease;
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                margin-bottom: 12px;
            }
            p {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title-decoder">Nietzsche Virus Lab</h1>
        <p id="text-decoder">This website is currently under construction. Check back soon<span class="dot">.</span></p>
    </div>
    <script>
        // Decoding function for any element
        function decodeElement(element, finalText, speed) {
            const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let decodedText = "";
            let index = 0;

            function getRandomChar() {
                return characters[Math.floor(Math.random() * characters.length)];
            }

            function decode() {
                if (index < finalText.length) {
                    decodedText = finalText.slice(0, index);
                    let randomPart = "";
                    for (let i = index; i < finalText.length; i++) {
                        randomPart += getRandomChar();
                    }
                    element.innerHTML = decodedText + randomPart;
                    element.classList.add('decoding');
                    index++;
                    setTimeout(decode, speed);
                } else {
                    element.innerHTML = finalText;
                    element.classList.remove('decoding');
                }
            }

            decode();
        }

        // Elements and their final texts
        const titleDecoder = document.getElementById('title-decoder');
        const textDecoder = document.getElementById('text-decoder');
        const titleText = "Nietzsche Virus Lab";
        const textText = "This website is currently under construction. Check back soon<span class=\"dot\">.</span>";

        // Start decoding on page load
        window.onload = function() {
            decodeElement(titleDecoder, titleText, 50); // Title decodes at 50ms per character
            setTimeout(() => decodeElement(textDecoder, textText, 50), 1000); // Text starts 1s later
        };
    </script>
</body>
</html>
