<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nietzsche Virus Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
            position: relative;
        }
        /* Background Animation - Layer 1 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.15) 2px, transparent 2px);
            background-size: 25px 25px;
            opacity: 0.6;
            animation: drift 10s infinite ease-in-out;
            z-index: -1;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        /* Background Animation - Layer 2 */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.2) 1px, transparent 1px);
            background-size: 35px 35px;
            opacity: 0.4;
            animation: drift-reverse 12s infinite ease-in-out;
            z-index: -1;
        }
        @keyframes drift-reverse {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-60px, -60px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .container {
            text-align: center;
            padding: 20px;
            perspective: 1000px;
            max-width: 90%;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            word-wrap: break-word;
        }
        h1:hover {
            transform: rotateX(20deg) rotateY(20deg) translateZ(50px);
            color: #0071e3;
        }
        p {
            font-size: clamp(16px, 5vw, 24px);
            font-weight: 400;
            color: #6e6e73;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #0071e3;
            animation: typing 2.5s steps(40, end) forwards, blink 0.75s step-end 2.5s;
        }
        .dot {
            color: #0071e3;
            font-size: clamp(18px, 5vw, 28px);
        }

        /* Typing Animation */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
            100% { border-color: transparent; }
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                margin-bottom: 12px;
            }
            p {
                white-space: normal;
                animation: typing 2.5s steps(40, end) forwards;
                border-right: none;
            }
            /* Adjust background animation for mobile */
            body::before {
                animation: drift 15s infinite ease-in-out;
            }
            body::after {
                animation: drift-reverse 18s infinite ease-in-out;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nietzsche Virus Lab</h1>
        <p>This website is currently under construction. Check back soon<span class="dot">.</span></p>
    </div>
</body>
</html>
